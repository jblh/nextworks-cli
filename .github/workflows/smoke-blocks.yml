name: Smoke Test (Blocks install)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  blocks-smoke:
    name: blocks-smoke (node ${{ matrix.node }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [20]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install repo dependencies (workspaces)
        run: npm install

      - name: Build all packages (including CLI)
        run: npm run build

      - name: Create fresh Next.js app (App Router)
        run: |
          npx --yes create-next-app@latest ../sandbox-next --ts --eslint --app --no-src-dir --no-tailwind --use-npm

      - name: Install blocks into fresh app
        working-directory: ../sandbox-next
        run: |
          node "$GITHUB_WORKSPACE/cli/dist/index.js" add blocks --sections --templates --yes

      - name: "Debug: show sandbox package.json deps"
        working-directory: ../sandbox-next
        run: node -p "JSON.stringify(require('./package.json').dependencies, null, 2)"

      - name: Install app dependencies
        working-directory: ../sandbox-next
        run: npm install

      - name: "Debug: list node_modules entries for tw-*"
        working-directory: ../sandbox-next
        run: >-
          node -e "console.log(require('fs').readdirSync('node_modules').filter(n=>n.startsWith('tw-')).join('\n'))"

      - name: "Debug: confirm tw-animate-css installed"
        working-directory: ../sandbox-next
        run: >-
          node -e "process.exit(require('fs').existsSync('node_modules/tw-animate-css') ? 0 : 1)"

      - name: "Debug: tw-animate-css package.json"
        working-directory: ../sandbox-next
        run: node -p "require('fs').readFileSync(require.resolve('tw-animate-css/package.json'), 'utf8')"

      - name: "Debug: tw-animate-css exports (parsed)"
        working-directory: ../sandbox-next
        run: node -p "(({name,version,exports,main,style})=>({name,version,exports,main,style}))(require('tw-animate-css/package.json'))"

      - name: Build app
        working-directory: ../sandbox-next
        run: npm run build
